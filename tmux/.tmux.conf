# ---------------------------------------------------------------------------
# Prefix: Ctrl+a (like GNU screen)
# ---------------------------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ---------------------------------------------------------------------------
# Core behaviour
# ---------------------------------------------------------------------------
set -g default-terminal "xterm-256color"
set -g history-limit 10000
set -g mouse on
set -g base-index 1          # windows start at 1, not 0
set -g pane-base-index 1
set -g renumber-windows on   # close a window → gaps close automatically
set -g escape-time 10        # faster key sequences

# ---------------------------------------------------------------------------
# Status bar
# ---------------------------------------------------------------------------
set -g status on
set -g status-interval 5
set -g status-position bottom

# Colours: green on black
set -g status-style "fg=colour250,bg=colour235"

# Left: [session-name]
set -g status-left-length 30
set -g status-left "#[fg=colour214,bold][#S] "

# Right: hostname + time
set -g status-right-length 50
set -g status-right "#[fg=colour250]#H  #[fg=colour214]%Y-%m-%d %H:%M"

# Window list (centre)
set -g status-justify left
set -g window-status-format         " #I:#W "
set -g window-status-current-format "#[fg=colour232,bg=colour214,bold] #I:#W "  # highlighted active window

# ---------------------------------------------------------------------------
# Scroll / copy mode
# ---------------------------------------------------------------------------
set -g history-limit 50000

# Auto-enter copy mode on scroll up; pass through if already in copy mode or
# if the pane is running a mouse-aware app (vim, less, etc.)
bind -n WheelUpPane \
  if-shell -F -t= "#{mouse_any_flag}" \
    "send-keys -M" \
    "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"

bind -n WheelDownPane select-pane -t= \; send-keys -M

# vi keys in copy mode (easier without a physical keyboard)
set -g mode-keys vi

# PageUp jumps straight into copy mode and scrolls up one page
bind -n PageUp copy-mode -eu

# ---------------------------------------------------------------------------
# Convenience bindings
# ---------------------------------------------------------------------------
bind r source-file ~/.tmux.conf \; display "Config reloaded."
